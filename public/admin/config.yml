backend:
  name: git-gateway
  branch: main

media_folder: "public/uploads"
public_folder: "/uploads"

collections:
  - name: "carousel"
    label: "Hero Carousel"
    folder: "src/content/carousel"
    create: true
    slug: "{{slug}}"
    fields:
      - {
          label: "Title (Internal)",
          name: "title",
          widget: "string",
          hint: "Just for you to identify this image.",
        }
      - { label: "Hero Image", name: "image", widget: "image" }
      - {
          label: "Caption / Quote",
          name: "caption",
          widget: "string",
          required: false,
          hint: "Optional text to overlay on the image.",
        }
      - { label: "Publish Date", name: "date", widget: "datetime" }

  - name: "sessions"
    label: "Session Recaps"
    folder: "src/content/sessions"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Session Title", name: "title", widget: "string" }
      - { label: "Session Number", name: "session_number", widget: "number" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - {
          label: "Summary",
          name: "summary",
          widget: "text",
          hint: "A short 2-3 sentence teaser.",
        }
      - { label: "Full Recap", name: "body", widget: "markdown" }

  - name: "characters"
    label: "Characters"
    folder: "src/content/characters"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Date Added", name: "date", widget: "datetime" }
      - {
          label: "Portrait",
          name: "portrait",
          widget: "image",
          required: false,
        }
      - {
          label: "Type",
          name: "type",
          widget: "select",
          options: ["Player Character", "NPC"],
        }
      - {
          label: "Subtitle",
          name: "subtitle",
          widget: "string",
          hint: "e.g., Level 5 Tiefling Warlock",
        }
      - {
          label: "Status",
          name: "status",
          widget: "select",
          options: ["Alive", "Dead", "Missing"],
        }
      - { label: "Faction", name: "faction", widget: "string", required: false }
      - { label: "Backstory / Lore", name: "body", widget: "markdown" }

  - name: "locations"
    label: "Locations"
    folder: "src/content/locations"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Date Added", name: "date", widget: "datetime" }
      - {
          label: "Image / Map",
          name: "image",
          widget: "image",
          required: false,
        }
      - {
          label: "Type",
          name: "type",
          widget: "select",
          options: ["City", "Town", "Village", "Dungeon", "Region", "Landmark"],
        }
      - { label: "Region", name: "region", widget: "string", required: false }
      - {
          label: "Danger Level",
          name: "danger_level",
          widget: "select",
          options: ["Safe", "Moderate", "Dangerous", "Deadly", "Unknown"],
        }
      - { label: "Lore / Description", name: "body", widget: "markdown" }
